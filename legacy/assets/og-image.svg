<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient: deep navy -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#030a16"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <!-- Gold accent gradient -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#e8c96a"/>
    </linearGradient>
    <!-- Radial glow -->
    <radialGradient id="glow" cx="72%" cy="42%" r="38%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(201,168,76,0.07)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Radial glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="80" y="80" width="3" height="470" fill="url(#gold)" opacity="0.7"/>

  <!-- Brand mark square -->
  <rect x="110" y="96" width="52" height="52" rx="4" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <text x="136" y="131" font-family="Georgia, serif" font-size="28" font-weight="700" fill="url(#gold)" text-anchor="middle" font-style="italic">I</text>

  <!-- Brand name -->
  <text x="176" y="131" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" letter-spacing="2">IntelliSite</text>

  <!-- Separator line -->
  <line x1="110" y1="174" x2="600" y2="174" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>

  <!-- Eyebrow -->
  <text x="110" y="220" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#C9A84C" letter-spacing="3" text-transform="uppercase">ESTATE AGENT WEB DESIGN · COVENTRY &amp; WEST MIDLANDS</text>

  <!-- Main headline -->
  <text x="110" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700" fill="#ffffff">Estate Agent Websites</text>
  <text x="110" y="366" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700" fill="#ffffff">That Win Instructions.</text>

  <!-- Sub-line -->
  <text x="110" y="430" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.6)" font-weight="400">Bespoke, high-performance websites for independent estate agencies</text>
  <text x="110" y="458" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.6)" font-weight="400">across Coventry, Birmingham, and the West Midlands.</text>

  <!-- Pill tags -->
  <rect x="110" y="498" width="160" height="36" rx="18" fill="none" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
  <text x="190" y="521" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="500">Bespoke — no templates</text>

  <rect x="284" y="498" width="160" height="36" rx="18" fill="none" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
  <text x="364" y="521" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="500">Estate agencies only</text>

  <rect x="458" y="498" width="196" height="36" rx="18" fill="none" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
  <text x="556" y="521" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="500">Coventry &amp; West Midlands</text>

  <!-- Right decorative panel -->
  <rect x="820" y="80" width="300" height="470" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(201,168,76,0.15)" stroke-width="1"/>
  <rect x="840" y="110" width="260" height="140" rx="2" fill="rgba(201,168,76,0.06)"/>
  <text x="970" y="175" font-family="Georgia, serif" font-size="36" fill="rgba(201,168,76,0.5)" text-anchor="middle" font-style="italic">Premium</text>
  <text x="970" y="215" font-family="Georgia, serif" font-size="28" fill="rgba(201,168,76,0.35)" text-anchor="middle" font-style="italic">Web Design</text>

  <line x1="840" y1="276" x2="1100" y2="276" stroke="rgba(201,168,76,0.15)" stroke-width="1"/>

  <text x="860" y="316" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" letter-spacing="2">SERVICES</text>
  <text x="860" y="342" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">Custom Design Systems</text>
  <text x="860" y="368" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">Property Tech Integration</text>
  <text x="860" y="394" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">SEO &amp; Digital Growth</text>

  <line x1="840" y1="420" x2="1100" y2="420" stroke="rgba(201,168,76,0.15)" stroke-width="1"/>

  <text x="860" y="456" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" letter-spacing="2">GET STARTED</text>
  <text x="860" y="478" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#C9A84C">intellisite.co.uk</text>

  <!-- Bottom border -->
  <line x1="0" y1="627" x2="1200" y2="627" stroke="rgba(201,168,76,0.2)" stroke-width="3"/>
</svg>
